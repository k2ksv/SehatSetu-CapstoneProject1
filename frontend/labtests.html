<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Tests | Sehat Setu</title>
    <link rel="stylesheet" href="assets/styles.css">
    <style>
        .labtests-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            animation: pageFadeIn 0.45s ease both;
        }

        .filters {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .filters:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.06);
        }

        .filters input, .filters select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            min-width: 150px;
        }

        .filters button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .filters button:hover {
            background: #0056b3;
        }

        .labtests-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .labtest-card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            animation: fadeInUp 0.5s ease both;
        }

        .labtest-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 22px rgba(0,0,0,0.12);
        }

        .labtest-image {
            width: 100%;
            height: 200px;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c757d;
            font-size: 14px;
        }

        .labtest-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .labtest-info {
            padding: 15px;
        }

        .labtest-name {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #333;
        }

        .labtest-type {
            color: #007bff;
            font-weight: 500;
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .labtest-details {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }

        .labtest-price {
            color: #28a745;
            font-weight: bold;
            font-size: 1.1em;
        }

        .book-test-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 4px;
            margin-top: 10px;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
        }

        .book-test-btn:hover {
            background: #218838;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #666;
        }

        .no-labtests {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filters input, .filters select {
                min-width: auto;
            }

            .labtests-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Modal styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 20px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover {
            color: black;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .submit-btn {
            background: #28a745;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }

        .submit-btn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="site-brand">
            <img src="assets/sehatsetu-logo.png" alt="Sehat Setu Logo" class="site-logo">
            <div class="brand-text">
                <strong>Sehat Setu</strong>
                <span class="brand-subtitle">Dashboard & Health Connect</span>
            </div>
        </a>
        <nav class="site-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="doctors.html">Doctors</a>
            <a href="hospitals.html">Hospitals</a>
            <a href="labtests.html">Lab Tests</a>
            <a href="compare.html">Compare</a>
            <a href="login.html">Login</a>
        </nav>
    </header>

    <div class="labtests-container">
        <h1>Lab Tests</h1>

        <div class="filters">
            <input type="text" id="searchName" placeholder="Search by test name...">
            <select id="filterType">
                <option value="">All Types</option>
                <option value="blood">Blood Test</option>
                <option value="urine">Urine Test</option>
                <option value="imaging">Imaging</option>
                <option value="other">Other</option>
            </select>
            <input type="text" id="searchHospital" placeholder="Search by hospital...">
            <select id="sortBy">
                <option value="">Sort By</option>
                <option value="price-low">Price: Low to High</option>
                <option value="price-high">Price: High to Low</option>
                <option value="name">Name</option>
            </select>
            <button onclick="filterLabTests()">Search</button>
            <button onclick="clearFilters()">Clear</button>
        </div>

        <div id="labtestsGrid" class="labtests-grid">
            <div class="loading">Loading lab tests...</div>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>Book Lab Test</h2>
            <form id="bookingForm">
                <div class="form-group">
                    <label for="patientName">Full Name:</label>
                    <input type="text" id="patientName" required>
                </div>
                <div class="form-group">
                    <label for="patientEmail">Email:</label>
                    <input type="email" id="patientEmail" required>
                </div>
                <div class="form-group">
                    <label for="patientPhone">Phone:</label>
                    <input type="tel" id="patientPhone" required>
                </div>
                <div class="form-group">
                    <label for="appointmentDate">Preferred Date:</label>
                    <input type="date" id="appointmentDate" required>
                </div>
                <div class="form-group">
                    <label for="appointmentTime">Preferred Time:</label>
                    <input type="time" id="appointmentTime" required>
                </div>
                <div class="form-group">
                    <label for="notes">Additional Notes:</label>
                    <textarea id="notes" placeholder="Any special instructions or notes..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Book Test</button>
            </form>
        </div>
    </div>

    <script src="assets/config.js"></script>
    <script src="assets/labtests-api.js"></script>
</body>
</html>
