<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - Sehat Setu</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header>
        <h1>Support Center</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="support.html" class="active">Support</a>
        </nav>
    </header>
    <main>
        <section class="support-section">
            <h2>Need Help?</h2>
            <p>If you are facing any issues or have questions, please fill out the form below. Our support team will get back to you as soon as possible.</p>
            <form id="supportForm">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Your Email</label>
                <input type="email" id="email" name="email" required>

                <label for="issue">Describe Your Problem</label>
                <textarea id="issue" name="issue" rows="5" required></textarea>

                <button type="submit">Submit</button>
            </form>
            <div id="supportMessage" style="display:none;"></div>
        </section>
    </main>
    <script>
        document.getElementById('supportForm').addEventListener('submit', function(e) {
            e.preventDefault();
            document.getElementById('supportMessage').style.display = 'block';
            document.getElementById('supportMessage').textContent = 'Thank you for contacting support. We will reach out to you soon!';
            this.reset();
        });
    </script>
</body>
</html>
