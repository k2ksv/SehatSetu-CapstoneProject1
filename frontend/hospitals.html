<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospitals | Sehat Setu</title>
    <link rel="stylesheet" href="assets/styles.css">
    <style>
        .hospital-card {
            border: none;
            border-left: 5px solid #FF8C42;
            border-radius: 16px;
            padding: 20px;
            margin: 16px 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(245,255,254,0.95));
            box-shadow: 0 4px 16px rgba(22, 166, 151, 0.12);
            transition: transform 280ms cubic-bezier(0.34, 1.56, 0.64, 1), 
                        box-shadow 280ms ease,
                        border-color 280ms ease;
            animation: fadeInUp 0.5s ease both;
        }
        .hospital-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 16px 40px rgba(22, 166, 151, 0.2);
            border-left-color: #16A697;
        }
        .hospital-photo {
            text-align: center;
            margin-bottom: 18px;
        }
        .hospital-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid rgba(22, 166, 151, 0.1);
            transition: transform 0.3s ease;
        }
        .hospital-card:hover .hospital-image {
            transform: scale(1.04);
        }
        .no-photo {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #F5FFFE, #E8F8F5);
            border: 2px solid rgba(22, 166, 151, 0.15);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7A9690;
            font-size: 14px;
            font-weight: 500;
        }
        .hospital-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .hospital-name {
            font-size: 1.3em;
            font-weight: 700;
            color: #0E7A6F;
            letter-spacing: -0.02em;
        }
        .hospital-type {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .private { background: linear-gradient(135deg, #FF8C42, #E67E2C); color: white; }
        .government { background: linear-gradient(135deg, #16A697, #0E7A6F); color: white; }
        .hospital-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin: 14px 0;
        }
        .detail-item {
            font-size: 0.95em;
            color: #4A6B64;
            line-height: 1.5;
        }
        .facilities-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        .facility-tag {
            background: linear-gradient(135deg, #D4F1ED, #E8F8F5);
            color: #0E7A6F;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            border: 1px solid rgba(22, 166, 151, 0.2);
            transition: all 200ms ease;
        }
        .facility-tag:hover {
            background: linear-gradient(135deg, #16A697, #0E7A6F);
            color: white;
            transform: translateY(-2px);
        }
        .rating {
            color: #FF8C42;
            font-weight: 700;
            font-size: 1.1em;
        }
        .filters {
            background: linear-gradient(135deg, rgba(245,255,254,0.8), rgba(212,241,237,0.5));
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 2px solid rgba(22, 166, 151, 0.1);
            transition: transform 200ms ease, box-shadow 200ms ease;
        }
        .filters:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(22, 166, 151, 0.15);
        }
        .filter-row {
            display: flex;
            gap: 18px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filter-group {
            display: flex;
            flex-direction: column;
        }
        .backend-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.9rem 1.2rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.95em;
            letter-spacing: 0.02em;
            margin-bottom: 1.5rem;
            border: 1px solid transparent;
            transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
        }
        .backend-status.connected {
            background: rgba(22, 166, 151, 0.12);
            color: #0E7A6F;
            border-color: rgba(22, 166, 151, 0.25);
        }
        .backend-status.disconnected {
            background: rgba(255, 140, 66, 0.12);
            color: #E67E2C;
            border-color: rgba(255, 140, 66, 0.25);
        }
        .backend-status .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            background: currentColor;
        }
        .filter-group label {
            font-weight: 700;
            margin-bottom: 8px;
            color: #0E7A6F;
            font-size: 0.95em;
            letter-spacing: 0.3px;
        }
        .filter-group input, .filter-group select {
            padding: 10px 14px;
            border: 2px solid rgba(22, 166, 151, 0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.95);
            color: #1A3B35;
            font-weight: 500;
            transition: border 200ms ease, background 200ms ease;
        }
        .filter-group input:focus, .filter-group select:focus {
            border-color: #16A697;
            background: rgba(245,255,254,0.5);
            outline: none;
        }
        .empty-state {
            background: rgba(22, 166, 151, 0.08);
            border: 1px dashed rgba(22, 166, 151, 0.4);
            color: #0E7A6F;
            border-radius: 18px;
            padding: 2rem;
            margin: 2rem 0;
            text-align: center;
            box-shadow: inset 0 0 0 1px rgba(22, 166, 151, 0.05);
        }
        .empty-state h2 {
            margin: 0 0 0.5rem;
            font-size: 1.7em;
            letter-spacing: -0.03em;
        }
        .empty-state p {
            margin: 0 0 1rem;
            color: #4A6B64;
            line-height: 1.6;
            max-width: 42rem;
            margin-left: auto;
            margin-right: auto;
        }
        .empty-state button {
            background: linear-gradient(135deg, #16A697, #0E7A6F);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 0.9rem 1.8rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(22, 166, 151, 0.18);
            transition: transform 180ms ease, box-shadow 180ms ease;
        }
        .empty-state button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(22, 166, 151, 0.24);
        }

        .compare-section {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: linear-gradient(135deg, #FF8C42, #E67E2C);
            color: white;
            padding: 18px 24px;
            border-radius: 16px;
            box-shadow: 0 8px 28px rgba(255, 140, 66, 0.25);
            display: none;
            animation: fadeInUp 0.5s ease both;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        .compare-list {
            margin: 12px 0;
            font-size: 0.95em;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .compare-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 5px 0;
        }
        .remove-btn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 3px;
            padding: 2px 6px;
            cursor: pointer;
        }
        .compare-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-container input[type="checkbox"] {
            margin: 0;
        }
    </style>
</head>
<body>
    <header class="site-header">
        <a href="index.html" class="site-brand">
            <img src="assets/sehatsetu-logo.png" alt="Sehat Setu Logo" class="site-logo">
            <div class="brand-text">
                <strong>Sehat Setu</strong>
                <span class="brand-subtitle">Dashboard & Health Connect</span>
            </div>
        </a>
        <nav class="site-nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="doctors.html">Doctors</a>
            <a href="hospitals.html">Hospitals</a>
            <a href="labtests.html">Lab Tests</a>
            <a href="compare.html">Compare</a>
            <a href="login.html">Login</a>
        </nav>
    </header>
    <div class="container">
        <h1>Hospitals Directory</h1>
        <div id="backendStatus" class="backend-status disconnected">
            <span class="status-dot"></span>
            <span>Checking backend...</span>
        </div>

        <div class="filters">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="searchName">Search by Name:</label>
                    <input type="text" id="searchName" placeholder="Enter hospital name...">
                </div>
                <div class="filter-group">
                    <label for="locationFilter">Location:</label>
                    <input type="text" id="locationFilter" placeholder="Enter location...">
                </div>
                <div class="filter-group">
                    <label for="typeFilter">Type:</label>
                    <select id="typeFilter">
                        <option value="">All Types</option>
                        <option value="private">Private</option>
                        <option value="government">Government</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label for="sortBy">Sort By:</label>
                    <select id="sortBy">
                        <option value="name">Name</option>
                        <option value="rating">Rating</option>
                        <option value="beds">Beds</option>
                    </select>
                </div>
                <button onclick="applyFilters()" style="padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; align-self: flex-end;">Apply Filters</button>
            </div>
        </div>

        <div id="hospitalsContainer">
            <!-- Hospital cards will be loaded here -->
        </div>
    </div>

    <div class="compare-section" id="compareSection">
        <h3>Compare Hospitals</h3>
        <div class="compare-list" id="compareList">
            <!-- Selected hospitals for comparison -->
        </div>
        <button class="compare-btn" onclick="openComparison()">Compare Selected</button>
    </div>

    <script src="assets/app.js"></script>
    <script>
        let allHospitals = [];
        let selectedForComparison = [];

        async function loadHospitals() {
            updateBackendStatus('checking');
            try {
                const response = await fetch('http://127.0.0.1:8000/api/hospitals/');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                allHospitals = data.hospitals;
                updateBackendStatus('connected');
                displayHospitals(allHospitals);
            } catch (error) {
                console.error('Error loading hospitals:', error);
                updateBackendStatus('disconnected');
                document.getElementById('hospitalsContainer').innerHTML = `
                    <div class="empty-state">
                        <h2>Unable to load hospitals</h2>
                        <p>There was a problem retrieving hospital data. Please make sure the backend server is running and try again.</p>
                        <button onclick="loadHospitals()">Retry</button>
                    </div>
                `;
            }
        }

        function updateBackendStatus(status) {
            const statusEl = document.getElementById('backendStatus');
            if (!statusEl) return;

            statusEl.classList.remove('connected', 'disconnected');
            if (status === 'connected') {
                statusEl.classList.add('connected');
                statusEl.innerHTML = `<span class="status-dot"></span><span>Backend connected</span>`;
            } else if (status === 'disconnected') {
                statusEl.classList.add('disconnected');
                statusEl.innerHTML = `<span class="status-dot"></span><span>Backend disconnected</span>`;
            } else {
                statusEl.innerHTML = `<span class="status-dot"></span><span>Checking backend...</span>`;
            }
        }

        function displayHospitals(hospitals) {
            const container = document.getElementById('hospitalsContainer');
            container.innerHTML = '';

            if (hospitals.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>No hospitals found</h2>
                        <p>We couldn't find any hospitals matching your current filters. Try clearing the filters or using a broader search term.</p>
                        <button onclick="resetFilters()">Reset filters</button>
                    </div>
                `;
                return;
            }

            hospitals.forEach(hospital => {
                const card = createHospitalCard(hospital);
                container.appendChild(card);
            });
        }

        function resetFilters() {
            document.getElementById('searchName').value = '';
            document.getElementById('locationFilter').value = '';
            document.getElementById('typeFilter').value = '';
            document.getElementById('sortBy').value = 'name';
            displayHospitals(allHospitals);
        }

        function createHospitalCard(hospital) {
            const card = document.createElement('div');
            card.className = 'hospital-card';

            const typeClass = hospital.type === 'private' ? 'private' : 'government';

            card.innerHTML = `
                <div class="hospital-photo">
                    ${hospital.photo ?
                        `<img src="${hospital.photo}" alt="${hospital.name}" class="hospital-image">` :
                        '<div class="no-photo">No Photo Available</div>'
                    }
                </div>
                <div class="hospital-header">
                    <div class="hospital-name">${hospital.name}</div>
                    <div class="checkbox-container">
                        <input type="checkbox" id="compare-${hospital.id}" onchange="toggleComparison(${hospital.id}, '${hospital.name}')">
                        <label for="compare-${hospital.id}">Compare</label>
                    </div>
                </div>
                <div class="hospital-type ${typeClass}">${hospital.type.charAt(0).toUpperCase() + hospital.type.slice(1)}</div>
                <div class="hospital-details">
                    <div class="detail-item"><strong>Location:</strong> ${hospital.location}</div>
                    <div class="detail-item"><strong>Beds:</strong> ${hospital.beds}</div>
                    <div class="detail-item"><strong>Price Range:</strong> ${hospital.price_range || 'Not specified'}</div>
                    <div class="detail-item"><strong>Rating:</strong> <span class="rating">${hospital.rating}/5</span></div>
                </div>
                <div class="detail-item"><strong>Contact:</strong> ${hospital.contact_number || 'Not available'}</div>
                <div class="detail-item"><strong>Specialties:</strong> ${hospital.specialties.join(', ') || 'Not specified'}</div>
                <div class="detail-item"><strong>Facilities:</strong></div>
                <div class="facilities-list">
                    ${hospital.facilities.map(facility => `<span class="facility-tag">${facility}</span>`).join('')}
                </div>
            `;

            return card;
        }

        function toggleComparison(hospitalId, hospitalName) {
            const checkbox = document.getElementById(`compare-${hospitalId}`);
            const index = selectedForComparison.findIndex(h => h.id === hospitalId);

            if (checkbox.checked) {
                if (selectedForComparison.length >= 3) {
                    alert('You can compare up to 3 hospitals at a time.');
                    checkbox.checked = false;
                    return;
                }
                selectedForComparison.push({ id: hospitalId, name: hospitalName });
            } else {
                if (index > -1) {
                    selectedForComparison.splice(index, 1);
                }
            }

            updateCompareSection();
        }

        function updateCompareSection() {
            const section = document.getElementById('compareSection');
            const list = document.getElementById('compareList');

            if (selectedForComparison.length > 0) {
                section.style.display = 'block';
                list.innerHTML = selectedForComparison.map(h => `
                    <div class="compare-item">
                        <span>${h.name}</span>
                        <button class="remove-btn" onclick="removeFromComparison(${h.id})">×</button>
                    </div>
                `).join('');
            } else {
                section.style.display = 'none';
            }
        }

        function removeFromComparison(hospitalId) {
            selectedForComparison = selectedForComparison.filter(h => h.id !== hospitalId);
            document.getElementById(`compare-${hospitalId}`).checked = false;
            updateCompareSection();
        }

        function openComparison() {
            if (selectedForComparison.length === 0) return;

            const ids = selectedForComparison.map(h => h.id);
            const url = `compare.html?ids=${ids.join(',')}`;
            window.open(url, '_blank');
        }

        function applyFilters() {
            const searchName = document.getElementById('searchName').value.toLowerCase();
            const locationFilter = document.getElementById('locationFilter').value.toLowerCase();
            const typeFilter = document.getElementById('typeFilter').value;
            const sortBy = document.getElementById('sortBy').value;

            let filtered = allHospitals.filter(hospital => {
                const matchesName = hospital.name.toLowerCase().includes(searchName);
                const matchesLocation = hospital.location.toLowerCase().includes(locationFilter);
                const matchesType = !typeFilter || hospital.type === typeFilter;

                return matchesName && matchesLocation && matchesType;
            });

            // Sort
            filtered.sort((a, b) => {
                switch (sortBy) {
                    case 'rating':
                        return b.rating - a.rating;
                    case 'beds':
                        return b.beds - a.beds;
                    case 'name':
                    default:
                        return a.name.localeCompare(b.name);
                }
            });

            displayHospitals(filtered);
        }

        // Load hospitals on page load
        loadHospitals();
    </script>
</body>
</html>
